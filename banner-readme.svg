<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo -->
  <rect width="900" height="260" fill="#0f172a"/>

  <!-- Panel -->
  <rect x="30" y="30" width="840" height="200" rx="6" fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <!-- Barra superior -->
  <rect x="30" y="30" width="840" height="28" fill="#c0c0c0"/>

  <!-- Título ventana -->
  <text x="45" y="48" font-family="Verdana" font-size="13" fill="black">
    Code For Cast v1.0
  </text>

  <!-- Botones -->
  <rect x="780" y="36" width="12" height="12" fill="#27c93f"/>
  <rect x="800" y="36" width="12" height="12" fill="#ffbd2e"/>
  <rect x="820" y="36" width="12" height="12" fill="#ff5f56"/>

  <!-- Texto principal -->
  <text x="70" y="120" font-family="Verdana" font-size="34" fill="#ffffff">
