  </text>

  <!-- Caja (icono software) -->
  <rect x="600" y="100" width="80" height="60" fill="#334155"/>
  <polygon points="600,100 640,70 720,70 680,100" fill="#475569"/>
  <rect x="610" y="110" width="60" height="40" fill="#020617"/>

  <!-- Datos -->
  <rect x="620" y="120" width="40" height="4" fill="#22c55e"/>
  <rect x="620" y="130" width="30" height="4" fill="#22c55e"/>
  <rect x="620" y="140" width="20" height="4" fill="#22c55e"/>

  <!-- Barra inferior -->
